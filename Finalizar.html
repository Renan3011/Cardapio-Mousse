<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalizar Encomenda</title>
  <link rel="stylesheet" href="Finalizar.css">
</head>
<body>

  <section id="dados-cliente">
    <div class="card-finalizacao">
      <h1>Finalizar Encomenda</h1>

      <div class="resumo-pedido">
        <h2>Resumo do pedido</h2>
        <ul id="resumo-lista"></ul>
        <p id="resumo-total">Total: R$ 0,00</p>
        <p id="resumo-desconto">Desconto: R$ 0,00</p>
        <p id="resumo-final">Total com desconto: R$ 0,00</p>
      </div>

      <form class="entradas" id="form-finalizacao" onsubmit="return false;">
        <input type="text" id="nome" placeholder="Digite seu nome">
        <input type="email" id="email" placeholder="Digite seu email">
        <input type="text" id="telefone" placeholder="Digite seu telefone">
        <input type="text" id="endereco" placeholder="Digite seu endereço">

        <label for="data-entrega">Data da entrega</label>
        <input type="datetime-local" id="data-entrega">

        <label for="pagamento">Forma de pagamento</label>
        <select id="pagamento">
          <option value="">Selecione</option>
          <option value="pix">Pix</option>
          <option value="dinheiro">Dinheiro</option>
          <option value="cartao">Cartão</option>
        </select>

        <textarea id="observacoes" placeholder="Observações"></textarea>

        <button type="button" id="btn-concluir">Concluir Pedido</button>
      </form>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="Finalizar.js"></script>

  <div id="popup-mensagem" class="popup-mensagem">
  <div class="popup-conteudo">
    <p id="popup-texto">Mensagem aqui</p>
    <button id="popup-fechar">OK</button>
  </div>
</div>
</body>
</html>
